<button id="install-btn" style="padding: 10px 20px;">安装 App</button>
<div id="ios-tip" style="display: none; padding: 10px; border: 1px solid #ccc;">
  请点击 Safari 底部的 <strong>“分享”按钮</strong>，然后选择 <strong>“添加到主屏幕”</strong> 来安装此应用。
</div>

<script>
  let deferredPrompt;

  // 检测 beforeinstallprompt 支持
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); // 防止自动弹出
    deferredPrompt = e;
    document.getElementById('install-btn').style.display = 'block';
  });

  // 检测 iOS + Safari
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

  if (isIOS && isSafari) {
    document.getElementById('install-btn').style.display = 'block';
    document.getElementById('install-btn').addEventListener('click', () => {
      document.getElementById('ios-tip').style.display = 'block';
    });
  } else {
    document.getElementById('install-btn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const choiceResult = await deferredPrompt.userChoice;
        if (choiceResult.outcome === 'accepted') {
          console.log('用户接受安装');
        } else {
          console.log('用户取消安装');
        }
        deferredPrompt = null;
      } else {
        alert('当前设备不支持自动安装，请尝试使用 Chrome 浏览器访问。');
      }
    });
  }
</script>

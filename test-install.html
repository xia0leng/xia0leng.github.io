<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c5bcff">
    <title>Install Test</title>
    <script>
      let deferredPrompt = null;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('status').textContent = "✅ 安装提示已就绪";
      });

      function triggerInstall() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
        } else {
          alert("❌ 浏览器未触发安装提示");
        }
      }
    </script>
  </head>
  <body>
    <h1>PWA 安装测试</h1>
    <p id="status">⏳ 等待安装提示事件...</p>
    <button onclick="triggerInstall()">点击安装</button>
  </body>
</html>

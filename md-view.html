<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Markdown文档渲染</title>
<script src="./js/marked.min.js"></script>
<style>
</style>
</head>
<body>
<div id="container"></div>
<script>
// 1. 读取URL参数
const urlParams = new URLSearchParams(location.search);
let mdPath = urlParams.get('file');

// 2. 无参数时，读取路径作为md文件（适配 /Drugs/ARP 路由）
if(!mdPath){
    let path = location.pathname;
    if(path.startsWith('/')) path = path.slice(1);
    mdPath = path + '.md';
}

// 3. 请求md并渲染
fetch(mdPath)
.then(res=>{
    if(!res.ok) throw new Error("文件不存在或读取失败");
    return res.text();
})
.then(mdText=>{
    const html = marked.parse(mdText);
    document.getElementById('container').innerHTML = html;
})
.catch(err=>{
    document.body.innerHTML = `<p style="color:red">加载异常：${err.message}</p>`;
})
</script>
</body>
</html>

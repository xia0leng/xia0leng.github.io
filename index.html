<script>
  // 全局变量挂到 window 上，便于 install.js 等模块访问
  window.pwaEvent = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); // 阻止浏览器自动弹出
    window.pwaEvent = e;

    // 如果你在 index.html 页面本身想显示一个安装按钮（可选）
    const btn = document.getElementById('install-btn');
    if (btn) {
      btn.style.display = 'block';

      btn.addEventListener('click', async () => {
        window.pwaEvent.prompt();
        const result = await window.pwaEvent.userChoice;
        console.log(result.outcome);
        window.pwaEvent = null;
      });
    }
  });
</script>

<script>
  // 注册 sw.js 用于 PWA 安装识别
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('✅ Service Worker 注册成功'))
      .catch(err => console.warn('❌ Service Worker 注册失败', err));
  }
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Markdown文档渲染</title>
<script src="./js/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{max-width:900px;margin:30px auto;padding:0 20px;font-family:system-ui,SimSun,serif;line-height:1.7}
h1,h2,h3,h4{margin:1.4em 0 0.6em}
h1{border-bottom:1px solid #eee;padding-bottom:6px}
blockquote{background:#f3f4f6;padding:12px 16px;border-left:4px solid #888;margin:1em 0}
blockquote.is-danger{border-left-color:#ef4444;background:#fef2f2}
blockquote.is-warning{border-left-color:#f59e0b;background:#fffbeb}
ul{padding-left:22px;margin:1em 0}
strong{font-weight:700}
sup{font-size:0.7em}
a{color:#0066cc}
</style>
</head>
<body>
<div id="container"></div>
<script>
// 1. 读取URL参数
const urlParams = new URLSearchParams(location.search);
let mdPath = urlParams.get('file');

// 2. 无参数时，读取路径作为md文件（适配 /Drugs/ARP 路由）
if(!mdPath){
    let path = location.pathname;
    if(path.startsWith('/')) path = path.slice(1);
    mdPath = path + '.md';
}

// 3. 请求md并渲染
fetch(mdPath)
.then(res=>{
    if(!res.ok) throw new Error("文件不存在或读取失败");
    return res.text();
})
.then(mdText=>{
    const html = marked.parse(mdText);
    document.getElementById('container').innerHTML = html;
})
.catch(err=>{
    document.body.innerHTML = `<p style="color:red">加载异常：${err.message}</p>`;
})
</script>
</body>
</html>
